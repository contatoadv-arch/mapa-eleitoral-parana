<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mapa PR - Versão Estável</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <style>
        body { margin: 0; background: #0a0c10; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { height: 50px; background: #14171f; display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #2a3148; }
        #map { flex: 1; background: #07090d; }
        .sidebar { width: 280px; background: #14171f; border-left: 1px solid #2a3148; padding: 15px; font-size: 13px; }
        input { background: #000; border: 1px solid #2a3148; color: #fff; padding: 5px; width: 130px; }
        .status { font-size: 10px; color: #4f8ef7; }
    </style>
</head>
<body>

<header>
    <span id="loadStatus" class="status">INICIANDO...</span>
    <div style="margin-left:auto; display:flex; gap:10px;">
        <input type="text" id="c1" placeholder="Candidato A" oninput="desenhar()">
        <input type="text" id="c2" placeholder="Candidato B" oninput="desenhar()">
        <button onclick="localStorage.clear(); location.reload();" style="cursor:pointer; background:#e63946; color:white; border:none; padding:5px 10px; border-radius:4px;">Limpar Cache</button>
    </div>
</header>

<div style="display:flex; flex:1; overflow:hidden;">
    <div id="map"></div>
    <div class="sidebar">
        <h3 id="munNome">Paraná</h3>
        <p id="munInfo">Digite os nomes para comparar.</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSckBOXlWUoaPUmw8cS57lzWxSVIcvqKe0l_t5kRo8ymELlAyqGbqkJQ7lT8x87EXXpv8ikou2tsSm9/pub?output=csv';
let bancoDados = {};
let geoJSON = null;

const map = L.map('map').setView([-24.8, -51.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// Função para limpar nomes (remove espaços e acentos)
function simplificar(texto) {
    return texto.toString().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

async function init() {
    try {
        const gRes = await fetch('https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-41-mun.json');
        geoJSON = await gRes.json();
        
        document.getElementById('loadStatus').innerText = "BAIXANDO DADOS...";
        const pRes = await fetch(`${URL_PLANILHA}&t=${Date.now()}`);
        const csv = await pRes.text();
        
        const linhas = csv.split('\n');
        linhas.slice(1).forEach(linha => {
            const col = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
            if (col.length < 3) return;
            
            const mun = simplificar(col[0]);
            const cand = simplificar(col[1]);
            const votos = parseInt(col[2].replace(/\D/g,'')) || 0;

            if (!bancoDados[mun]) bancoDados[mun] = { cands: [], teto: 0 };
            bancoDados[mun].cands.push({ n: cand, v: votos });
            if (votos > bancoDados[mun].teto) bancoDados[mun].teto = votos;
        });

        document.getElementById('loadStatus').innerText = "SISTEMA PRONTO";
        desenhar();
    } catch (e) {
        document.getElementById('loadStatus').innerText = "ERRO AO CARREGAR";
    }
}

function desenhar() {
    if (window.camada) map.removeLayer(window.camada);
    
    const b1 = simplificar(document.getElementById('c1').value);
    const b2 = simplificar(document.getElementById('c2').value);

    window.camada = L.geoJSON(geoJSON, {
        style: f => {
            const munMap = simplificar(f.properties.name);
            const dados = bancoDados[munMap];
            
            if (!dados || b1.length < 3 || b2.length < 3) 
                return { color: '#2a3148', weight: 0.5, fillColor: '#1f2430', fillOpacity: 0.4 };

            const v1 = (dados.cands.find(c => c.n.includes(b1))?.v || 0) / (dados.teto || 1);
            const v2 = (dados.cands.find(c => c.n.includes(b2))?.v || 0) / (dados.teto || 1);
            
            if (v1 + v2 === 0) return { fillColor: '#111', fillOpacity: 0.3, weight: 0.5 };
            
            const ratio = v2 / (v1 + v2);
            return { 
                fillColor: ratio > 0.5 ? '#e63946' : '#4f8ef7', 
                fillOpacity: Math.max(0.3, Math.abs(ratio - 0.5) * 2),
                weight: 1, color: '#fff' 
            };
        },
        onEachFeature: (f, layer) => {
            layer.on('click', () => {
                const mun = simplificar(f.properties.name);
                document.getElementById('munNome').innerText = f.properties.name;
                document.getElementById('munInfo').innerText = bancoDados[mun] ? "Dados carregados." : "Sem dados nesta cidade.";
            });
        }
    }).addTo(map);
}

init();
</script>
</body>
</html>
