<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Eleitoral PR — Confronto de Força</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #14171f; --surface2: #1f2430;
    --border: #2a3148; --accent: #4f8ef7; --text: #e8ecf4; --text2: #8b93a8;
    --candA: #4f8ef7; --candB: #e63946;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; gap: 10px; padding: 8px 15px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; }
  .input-search { background: #000; border: 1px solid var(--border); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 11px; outline: none; }
  
  .status-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; padding: 4px 8px; border-radius: 3px; background: #1a1e2e; color: #4f8ef7; border: 1px solid #2a3148; }

  .main { display: flex; flex: 1; overflow: hidden; position: relative; }
  #map { flex: 1; background: #07090d; }
  
  /* PAINEL LATERAL DE CONFRONTO */
  .sidebar { width: 380px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); background: var(--surface2); text-align: center; }
  
  .confronto-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
  
  .v-section { border-radius: 8px; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); }
  .v-section.active-a { border-left: 5px solid var(--candA); }
  .v-section.active-b { border-left: 5px solid var(--candB); }

  .v-name { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; margin-bottom: 2px; text-transform: uppercase; }
  .v-cargo { font-size: 10px; color: var(--text2); margin-bottom: 10px; display: block; }
  
  .v-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .v-stat-box { background: #000; padding: 8px; border-radius: 4px; text-align: center; }
  .v-stat-label { font-size: 8px; color: var(--text2); display: block; }
  .v-stat-val { font-family: 'IBM Plex Mono'; font-size: 12px; font-weight: 600; }

  .top-cities-title { font-size: 10px; font-weight: 600; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .city-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .city-name { font-weight: 400; }
  .city-perc { font-family: 'IBM Plex Mono'; font-weight: 600; }

  .vs-divider { text-align: center; font-family: 'IBM Plex Mono'; font-style: italic; color: var(--border); font-weight: 900; font-size: 24px; margin: -10px 0; z-index: 1; }
</style>
</head>
<body>

<header>
  <div class="status-badge" id="loadStatus">CARREGANDO...</div>
  <input type="text" id="searchMun" class="input-search" style="width:110px" placeholder="🔍 Ir para cidade..." onkeyup="if(event.key==='Enter') buscarMunicipio()">
  
  <div style="display:flex; align-items:center; gap:8px; padding: 4px 10px; background: rgba(255,255,255,0.03); border-radius: 5px; border: 1px solid var(--border);">
    <input type="text" id="cand1" class="input-search" style="width:150px; border-color: var(--candA)" placeholder="Candidato A" oninput="comparar()">
    <span style="font-size:10px; font-weight:bold; color:var(--text2)">X</span>
    <input type="text" id="cand2" class="input-search" style="width:150px; border-color: var(--candB)" placeholder="Candidato B" oninput="comparar()">
  </div>
  <button onclick="localStorage.clear(); location.reload();" style="margin-left:auto; padding: 6px; font-size:9px; background:none; border:1px solid var(--border); color:var(--text2); cursor:pointer;">Limpar Cache</button>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div style="font-size:12px; font-weight:600; letter-spacing: 2px;">PAINEL DE CONFRONTO</div>
    </div>
    <div id="confronto" class="confronto-container">
       <div style="color:var(--text2); text-align:center; margin-top:50px;">Digite dois nomes para iniciar o duelo de força relativa.</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CARGOS = [
  { id: 'prefeito', pubId: '2PACX-1vSckBOXlWUoaPUmw8cS57lzWxSVIcvqKe0l_t5kRo8ymELlAyqGbqkJQ7lT8x87EXXpv8ikou2tsSm9' },
  { id: 'vereador', pubId: '2PACX-1vRpedSBo3JsGPENvU-WDCoIsG9ij_n5H58-63dDQFyg-N1aNW_bTlp-qlRWnM7f-DxwY5GRnEAozAb6' },
  { id: 'governador', pubId: '2PACX-1vQgr3d0ZpsR4-XyZ78RTACi8w__I32rAtHCxygT1snVu8kAW_SDT7OHs2EZPFUa-TwwWmm-VuJjVews' },
  { id: 'senador', pubId: '2PACX-1vTwDP_rWXeGuNrZa_P1doV5yqyIKoPLgrXGuZ5E1jGW38zbPyqV3qqCcILV8kX8jNHUqtPaLoh8-6le' },
  { id: 'dep_estadual', pubId: '2PACX-1vRMmzjng4UNfnkH4GROewoGsj8_k-3V1K1G-uB9l3US_Y4oQ8vn399e_a7ca1WrFLQYsGaXMON43LxG' },
  { id: 'dep_federal', pubId: '2PACX-1vReWuQtkZI_ZdV6Wr7JIkgW5zN58vBR2iQPRPN7sLUu4cs3NhPMU_RPJYlrmLZxLYUWkPDjVUs_HQGV' }
];

let bancoDados = {}; 
let layersMunicipios = {};
let geoLayer;

const map = L.map('map', { zoomSnap: 0.5, preferCanvas: true }).setView([-24.8, -51.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

function mixColors(color1, color2, weight) {
  const p = weight;
  const hex = (c) => parseInt(c, 16);
  const r = Math.round(hex(color1.slice(1,3)) * (1-p) + hex(color2.slice(1,3)) * p);
  const g = Math.round(hex(color1.slice(3,5)) * (1-p) + hex(color2.slice(3,5)) * p);
  const b = Math.round(hex(color1.slice(5,7)) * (1-p) + hex(color2.slice(5,7)) * p);
  return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

async function init() {
  for (const cargo of CARGOS) {
    const cacheKey = `data_v3_${cargo.id}`;
    let csv = localStorage.getItem(cacheKey);
    if (!csv) {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/e/${cargo.pubId}/pub?output=csv`);
      csv = await res.text();
      localStorage.setItem(cacheKey, csv);
    }
    processarCSV(cargo.id, csv);
  }
  document.getElementById('loadStatus').innerText = "DADOS OK";
  renderizarMapa();
}

function processarCSV(cargoId, csv) {
  const linhas = csv.split('\n');
  const cabecalho = linhas[0].split(',').map(h => h.replace(/"/g, '').trim().toUpperCase());
  const idx = {
    mun: cabecalho.findIndex(h => h.includes('MUNICIPIO') || h.includes('NM_MUN')),
    cand: cabecalho.findIndex(h => h.includes('CANDIDATO') || h.includes('NM_VOTAVEL')),
    votos: cabecalho.findIndex(h => h.includes('VOTOS') || h.includes('QT_VOTOS'))
  };
  for(let i=1; i<linhas.length; i++) {
    const col = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
    const cid = col[idx.mun]?.toUpperCase();
    if (!cid) continue;
    if (!bancoDados[cid]) bancoDados[cid] = {};
    if (!bancoDados[cid][cargoId]) bancoDados[cid][cargoId] = { candidatos: [], teto: 0 };
    const votos = parseInt(col[idx.votos]?.replace(/\D/g,'')) || 0;
    bancoDados[cid][cargoId].candidatos.push({ n: col[idx.cand]?.toUpperCase(), v: votos });
    if (votos > bancoDados[cid][cargoId].teto) bancoDados[cid][cargoId].teto = votos;
  }
}

function getForca(cid, busca) {
  if (!bancoDados[cid] || !busca || busca.length < 2) return null;
  const b = busca.toUpperCase();
  for (let cargo in bancoDados[cid]) {
    const achou = bancoDados[cid][cargo].candidatos.find(c => c.n && c.n.includes(b));
    if (achou) return { f: (achou.v / bancoDados[cid][cargo].teto) * 100, v: achou.v, c: cargo, n: achou.n };
  }
  return null;
}

function comparar() {
  renderizarMapa();
  atualizarConfronto();
}

function renderizarMapa() {
  if (geoLayer) map.removeLayer(geoLayer);
  fetch('https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-41-mun.json')
  .then(r => r.json()).then(geo => {
    geoLayer = L.geoJSON(geo, {
      style: f => {
        const cid = f.properties.name.toUpperCase();
        const d1 = getForca(cid, document.getElementById('cand1').value);
        const d2 = getForca(cid, document.getElementById('cand2').value);
        if (!d1 && !d2) return { fillColor: '#111', weight: 0.2, fillOpacity: 0.3, color: '#333' };
        const f1 = d1 ? d1.f : 0;
        const f2 = d2 ? d2.f : 0;
        const ratio = f2 / (f1 + f2 || 1);
        return { fillColor: mixColors('#4f8ef7', '#e63946', ratio), fillOpacity: 0.7, weight: 0.4, color: '#fff' };
      },
      onEachFeature: (f, layer) => {
        layersMunicipios[f.properties.name.toUpperCase()] = layer;
        layer.on('click', () => { /* Zoom opcional */ });
      }
    }).addTo(map);
  });
}

function atualizarConfronto() {
  const container = document.getElementById('confronto');
  const b1 = document.getElementById('cand1').value;
  const b2 = document.getElementById('cand2').value;

  if (!b1 || !b2) return;

  // Analisar Top Cidades para cada um
  const analise = (busca) => {
    let cidades = [];
    let totalVotos = 0;
    let cargoDetectado = "";
    let nomeReal = "";

    for (let cid in bancoDados) {
      const res = getForca(cid, busca);
      if (res) {
        cidades.push({ nome: cid, forca: res.f, votos: res.v });
        totalVotos += res.v;
        cargoDetectado = res.c;
        nomeReal = res.n;
      }
    }
    return { 
      top: cidades.sort((a,b) => b.forca - a.forca).slice(0, 5), 
      totalVotos, 
      cargo: cargoDetectado, 
      nome: nomeReal 
    };
  };

  const resA = analise(b1);
  const resB = analise(b2);

  container.innerHTML = `
    <div class="v-section active-a">
      <div class="v-name" style="color:var(--candA)">${resA.nome || b1.toUpperCase()}</div>
      <span class="v-cargo">${resA.cargo.toUpperCase() || '---'}</span>
      <div class="v-stats-grid">
        <div class="v-stat-box"><span class="v-stat-label">VOTOS TOTAIS</span><span class="v-stat-val">${resA.totalVotos.toLocaleString()}</span></div>
        <div class="v-stat-box"><span class="v-stat-label">MÉDIA FORÇA</span><span class="v-stat-val">${(resA.top[0]?.forca || 0).toFixed(1)}%*</span></div>
      </div>
      <div class="top-cities-title">Principais Fortalezas (Força Relativa)</div>
      ${resA.top.map(c => `<div class="city-row"><span class="city-name">${c.nome}</span><span class="city-perc" style="color:var(--candA)">${c.forca.toFixed(1)}%</span></div>`).join('')}
    </div>

    <div class="vs-divider">VS</div>

    <div class="v-section active-b">
      <div class="v-name" style="color:var(--candB)">${resB.nome || b2.toUpperCase()}</div>
      <span class="v-cargo">${resB.cargo.toUpperCase() || '---'}</span>
      <div class="v-stats-grid">
        <div class="v-stat-box"><span class="v-stat-label">VOTOS TOTAIS</span><span class="v-stat-val">${resB.totalVotos.toLocaleString()}</span></div>
        <div class="v-stat-box"><span class="v-stat-label">MÉDIA FORÇA</span><span class="v-stat-val">${(resB.top[0]?.forca || 0).toFixed(1)}%*</span></div>
      </div>
      <div class="top-cities-title">Principais Fortalezas (Força Relativa)</div>
      ${resB.top.map(c => `<div class="city-row"><span class="city-name">${c.nome}</span><span class="city-perc" style="color:var(--candB)">${c.forca.toFixed(1)}%</span></div>`).join('')}
    </div>
  `;
}

function buscarMunicipio() {
  const busca = document.getElementById('searchMun').value.toUpperCase();
  const layer = layersMunicipios[busca];
  if (layer) map.fitBounds(layer.getBounds());
}

init();
</script>
</body>
</html>
