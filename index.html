<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Eleitoral PR — Fluxo Isolado</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #14171f; --border: #2a3148; --accent: #4f8ef7; --text: #e8ecf4; --text2: #8b93a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; gap: 10px; padding: 10px 15px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; }
  .sel-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
  .sel-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  
  .input-search { background: #000; border: 1px solid var(--border); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 11px; width: 140px; }

  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; background: #07090d; }
  
  .sidebar { width: 320px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); background: #1f2430; }
  .ranking-container { flex: 1; overflow-y: auto; padding: 12px; }
  
  .rank-item { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .rank-info { display: flex; justify-content: space-between; font-size: 10px; font-family: 'IBM Plex Mono'; margin-bottom: 4px; }
  .bar-bg { background: #000; height: 5px; border-radius: 2px; }
  .bar-fill { height: 100%; transition: width 0.5s; border-radius: 2px; }

  .vote-label {
    font-family: 'IBM Plex Mono', monospace !important; font-weight: 600 !important;
    color: #fff !important; text-shadow: 1px 1px 2px #000; font-size: 10px !important;
    background: none !important; border: none !important;
  }
</style>
</head>
<body>

<header>
  <div id="cargoSelector"></div>
  <input type="text" id="searchMun" class="input-search" placeholder="🔍 Buscar Cidade..." onkeyup="if(event.key==='Enter') buscarMunicipio()">
  <input type="text" id="search1" class="input-search" placeholder="Candidato A (Azul)" oninput="renderizarMapa()">
  <button class="sel-btn" onclick="limparGeral()">Reset</button>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div id="sbTitle" style="font-size:14px; font-weight:600;">Selecione um Cargo</div>
      <div id="sbSub" style="font-size:10px; color:var(--accent);">AGUARDANDO...</div>
    </div>
    <div id="ranking" class="ranking-container"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CONFIG_CARGOS = {
  prefeito: '2PACX-1vSckBOXlWUoaPUmw8cS57lzWxSVIcvqKe0l_t5kRo8ymELlAyqGbqkJQ7lT8x87EXXpv8ikou2tsSm9',
  vereador: '2PACX-1vRpedSBo3JsGPENvU-WDCoIsG9ij_n5H58-63dDQFyg-N1aNW_bTlp-qlRWnM7f-DxwY5GRnEAozAb6',
  governador: '2PACX-1vQgr3d0ZpsR4-XyZ78RTACi8w__I32rAtHCxygT1snVu8kAW_SDT7OHs2EZPFUa-TwwWmm-VuJjVews',
  senador: '2PACX-1vRMmzjng4UNfnkH4GROewoGsj8_k-3V1K1G-uB9l3US_Y4oQ8vn399e_a7ca1WrFLQYsGaXMON43LxG', // Exemplo
  dep_estadual: '2PACX-1vRMmzjng4UNfnkH4GROewoGsj8_k-3V1K1G-uB9l3US_Y4oQ8vn399e_a7ca1WrFLQYsGaXMON43LxG',
  dep_federal: '2PACX-1vReWuQtkZI_ZdV6Wr7JIkgW5zN58vBR2iQPRPN7sLUu4cs3NhPMU_RPJYlrmLZxLYUWkPDjVUs_HQGV'
};

const PARTIDO_CORES = { 'PT':'#e63946','PL':'#1d6ce0','PSD':'#8338ec','MDB':'#f4a261','PP':'#2ec4b6','UNIÃO':'#fb8500' };

let dadosAtivos = null; 
let cargoAtivo = '';
let munSelecionado = null;
let geoLayer = null;
let layersMunicipios = {};
let requestToken = 0; // TOKEN DE ISOLAMENTO

const map = L.map('map').setView([-24.5, -51.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

async function carregarFluxo(idCargo) {
  const meuToken = ++requestToken; // Gera um token único para esta requisição
  cargoAtivo = idCargo;
  
  // Interface: Limpa TUDO imediatamente
  dadosAtivos = null;
  munSelecionado = null;
  document.querySelectorAll('.sel-btn').forEach(b => b.classList.toggle('active', b.dataset.id === idCargo));
  document.getElementById('ranking').innerHTML = "Carregando fluxo...";
  document.getElementById('sbTitle').innerText = "Sincronizando...";

  const pubId = CONFIG_CARGOS[idCargo];
  const url = `https://docs.google.com/spreadsheets/d/e/${pubId}/pub?output=csv&t=${Date.now()}`;

  try {
    const res = await fetch(url);
    const csv = await res.text();

    // BLOQUEIO: Se o token mudou enquanto eu baixava, eu descarto o resultado
    if (meuToken !== requestToken) return;

    processarDados(csv);
    renderizarMapa();
    atualizarRanking();
  } catch (e) {
    if (meuToken === requestToken) document.getElementById('sbTitle').innerText = "Erro na conexão";
  }
}

function processarDados(csv) {
  const linhas = csv.split('\n').slice(1);
  const novoMapa = {};
  
  linhas.forEach(l => {
    const col = l.split(',').map(c => c.replace(/"/g, '').trim());
    if (col.length < 6) return;
    const cid = col[1].toUpperCase(), nome = col[2].toUpperCase(), part = col[3].toUpperCase(), votos = parseInt(col[5].replace(/\D/g,'')) || 0;

    if (!novoMapa[cid]) novoMapa[cid] = {};
    if (!novoMapa[cid][nome]) novoMapa[cid][nome] = { nome, part, votos: 0 };
    novoMapa[cid][nome].votos += votos;
  });

  dadosAtivos = {};
  for (let c in novoMapa) {
    dadosAtivos[c] = Object.values(novoMapa[c]).sort((a,b) => b.votos - a.votos);
  }
}

function renderizarMapa() {
  if (geoLayer) map.removeLayer(geoLayer);
  layersMunicipios = {};

  fetch('https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-41-mun.json')
    .then(r => r.json()).then(geo => {
      geoLayer = L.geoJSON(geo, {
        style: f => {
          const cid = f.properties.name.toUpperCase();
          const lista = dadosAtivos?.[cid];
          if (!lista) return { fillColor: '#111', weight: 0.3, fillOpacity: 0.4 };
          const top = lista[0];
          return { fillColor: PARTIDO_CORES[top.part] || '#333', fillOpacity: 0.7, weight: 0.3, color: '#444' };
        },
        onEachFeature: (f, layer) => {
          const cid = f.properties.name.toUpperCase();
          layersMunicipios[cid] = layer;
          
          const lista = dadosAtivos?.[cid];
          if (lista && lista[0]) {
            layer.bindTooltip(lista[0].votos.toLocaleString(), { 
              permanent: true, direction: 'center', className: 'vote-label', opacity: map.getZoom() < 8 ? 0 : 1 
            });
          }
          layer.on('click', () => {
            munSelecionado = f.properties.name;
            atualizarRanking();
          });
        }
      }).addTo(map);
    });
}

function atualizarRanking() {
  const container = document.getElementById('ranking');
  container.innerHTML = '';
  if (!dadosAtivos) return;

  let lista = [];
  if (munSelecionado) {
    lista = dadosAtivos[munSelecionado.toUpperCase()] || [];
    document.getElementById('sbTitle').innerText = munSelecionado;
    document.getElementById('sbSub').innerText = "Votos no Município";
  } else {
    const total = {};
    Object.values(dadosAtivos).forEach(cidade => {
      cidade.forEach(cand => {
        if (!total[cand.nome]) total[cand.nome] = { ...cand, votos: 0 };
        total[cand.nome].votos += cand.votos;
      });
    });
    lista = Object.values(total).sort((a,b) => b.votos - a.votos);
    document.getElementById('sbTitle').innerText = "Ranking Estadual";
    document.getElementById('sbSub').innerText = cargoAtivo.toUpperCase();
  }

  const max = lista[0]?.votos || 1;
  lista.slice(0, 50).forEach(c => {
    container.innerHTML += `
      <div class="rank-item">
        <div class="rank-info"><span>${c.nome}</span> <b>${c.votos.toLocaleString()}</b></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${(c.votos/max)*100}%; background:${PARTIDO_CORES[c.part] || '#555'}"></div></div>
      </div>`;
  });
}

function buscarMunicipio() {
  const b = document.getElementById('searchMun').value.toUpperCase();
  const l = layersMunicipios[b];
  if (l) { map.fitBounds(l.getBounds()); munSelecionado = b; atualizarRanking(); }
}

function limparGeral() {
  munSelecionado = null;
  map.setView([-24.5, -51.5], 7);
  carregarFluxo(cargoAtivo);
}

// Início
const header = document.getElementById('cargoSelector');
['prefeito', 'vereador', 'governador', 'senador', 'dep_estadual', 'dep_federal'].forEach(id => {
  const btn = document.createElement('button');
  btn.className = 'sel-btn';
  btn.innerText = id.split('_')[0].toUpperCase();
  btn.dataset.id = id;
  btn.onclick = () => carregarFluxo(id);
  header.appendChild(btn);
});

carregarFluxo('prefeito');
</script>
</body>
</html>
