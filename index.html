<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Eleitoral — Paraná (Consolidado)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #181c27; --surface2: #1f2435;
    --border: #2a3148; --accent: #4f8ef7; --accent2: #f7c94f;
    --text: #e8ecf4; --text2: #8b93a8; --text3: #5a6070;
    --success: #4ade80;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; gap: 14px; padding: 9px 18px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; flex-wrap: wrap; }
  header h1 { font-size: 14px; font-weight: 500; }
  .selector-group { display: flex; gap: 3px; align-items: center; }
  .selector-label { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; margin-right: 4px; }
  .sel-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 9px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
  .sel-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .sel-btn.ano.active { background: var(--accent2); border-color: var(--accent2); color: #0f1117; }
  .config-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; margin-left: auto; }

  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; background: #0a0d14; }
  
  .sidebar { width: 320px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); }
  .sb-municipio { font-size: 18px; font-weight: 600; color: var(--text); }
  .sb-meta { font-size: 11px; color: var(--accent); font-family: var(--mono); margin-top: 2px; }
  
  .ranking-container { flex: 1; overflow-y: auto; padding: 12px; }
  .rank-item { margin-bottom: 15px; }
  .rank-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-family: var(--mono); }
  .bar-bg { background: var(--surface2); height: 8px; border-radius: 4px; overflow: hidden; width: 100%; border: 1px solid var(--border); }
  .bar-fill { height: 100%; transition: width 0.6s ease; }

  /* NOMES DAS CIDADES NO MAPA */
  .city-label {
    font-weight: 700 !important;
    color: #000 !important;
    text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 0px 0px 4px #fff;
    font-size: 10px !important;
    background: none !important;
    border: none !important;
    box-shadow: none !important;
    pointer-events: none !important;
  }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); padding: 20px; border-radius: 8px; width: 600px; border: 1px solid var(--border); }
  .modal input { width: 100%; padding: 8px; margin: 8px 0; background: #000; border: 1px solid var(--border); color: #fff; font-family: var(--mono); font-size: 12px; }
</style>
</head>
<body>

<header>
  <h1>Mapa Eleitoral PR</h1>
  <div class="selector-group">
    <span class="selector-label">Cargo</span>
    <div id="cargoSelector"></div>
  </div>
  <div class="selector-group">
    <span class="selector-label">Ano</span>
    <div id="anoSelector"></div>
  </div>
  <button class="config-btn" onclick="abrirConfig()">⚙ Configurar Planilhas</button>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sb-municipio" id="sbMunicipio">Selecione uma cidade</div>
      <div class="sb-meta" id="sbMeta">Clique no mapa</div>
    </div>
    <div id="ranking" class="ranking-container"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Configuração de IDs (Cache Ativado)</h3>
    <p style="font-size:11px; color:var(--text3); margin-bottom:15px;">Cole o ID de publicação das suas planilhas do Google.</p>
    <div id="configInputs"></div>
    <button class="sel-btn active" style="margin-top:20px; width:100%" onclick="salvarEFechar()">Salvar e Carregar Dados</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CARGOS = [
  { id: 'prefeito', label: 'PREF', nome: 'Prefeito' },
  { id: 'vereador', label: 'VER', nome: 'Vereador' },
  { id: 'governador', label: 'GOV', nome: 'Governador' },
  { id: 'dep_federal', label: 'DEP.F', nome: 'Dep. Federal' }
];

const PARTIDO_CORES = { 'PT':'#e63946','PL':'#1d6ce0','PSD':'#8338ec','MDB':'#f4a261','PP':'#2ec4b6','UNIÃO':'#fb8500','PSDB':'#3a86ff' };

// CACHE LOCAL
let config = JSON.parse(localStorage.getItem('mapa_eleitoral_v2')) || {
  prefeito: { pubId: '2PACX-1vSckBOXlWUoaPUmw8cS57lzWxSVIcvqKe0l_t5kRo8ymELlAyqGbqkJQ7lT8x87EXXpv8ikou2tsSm9', abas: ['2024'] },
  vereador: { pubId: '2PACX-1vRpedSBo3JsGPENvU-WDCoIsG9ij_n5H58-63dDQFyg-N1aNW_bTlp-qlRWnM7f-DxwY5GRnEAozAb6', abas: ['2024'] },
  governador: { pubId: '2PACX-1vQgr3d0ZpsR4-XyZ78RTACi8w__I32rAtHCxygT1snVu8kAW_SDT7OHs2EZPFUa-TwwWmm-VuJjVews', abas: ['2022'] },
  dep_federal: { pubId: '2PACX-1vReWuQtkZI_ZdV6Wr7JIkgW5zN58vBR2iQPRPN7sLUu4cs3NhPMU_RPJYlrmLZxLYUWkPDjVUs_HQGV', abas: ['2022'] }
};

let dadosCache = {}; 
let cargoAtivo = 'prefeito';
let anoAtivo = '2024';
let geoLayer;

const map = L.map('map').setView([-24.5, -51.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

async function carregarDados() {
  const cfg = config[cargoAtivo];
  if (!cfg.pubId) return;
  
  const url = `https://docs.google.com/spreadsheets/d/e/${cfg.pubId}/pub?output=csv&gid=0`;
  try {
    const res = await fetch(url);
    const csv = await res.text();
    dadosCache[cargoAtivo] = processarCSV(csv);
    renderizarMapa();
  } catch(e) { console.error("Erro ao carregar dados"); }
}

function processarCSV(csv) {
  const linhas = csv.split('\n').slice(1);
  const consolidado = {};

  linhas.forEach(linha => {
    const col = linha.split(',').map(c => c.replace(/"/g, '').trim());
    if (col.length < 6) return;

    const cidade = col[1].toUpperCase();
    const nome = col[2];
    const partido = col[3];
    const votos = parseInt(col[5].replace(/\D/g,'')) || 0;

    if (!consolidado[cidade]) consolidado[cidade] = {};
    if (!consolidado[cidade][nome]) {
      consolidado[cidade][nome] = { nome, partido, votos: 0 };
    }
    consolidado[cidade][nome].votos += votos; // SOMA AUTOMÁTICA
  });

  const final = {};
  for (let cid in consolidado) {
    final[cid] = Object.values(consolidado[cid]).sort((a,b) => b.votos - a.votos);
  }
  return final;
}

function renderizarMapa() {
  if (geoLayer) map.removeLayer(geoLayer);
  fetch('https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-41-mun.json')
    .then(r => r.json())
    .then(geo => {
      geoLayer = L.geoJSON(geo, {
        style: f => {
          const cid = f.properties.name.toUpperCase();
          const d = dadosCache[cargoAtivo]?.[cid];
          return {
            fillColor: d ? (PARTIDO_CORES[d[0].partido] || '#555') : '#1a1f2e',
            weight: 0.8, color: '#0f1117', fillOpacity: 0.7
          };
        },
        onEachFeature: (f, layer) => {
          layer.bindTooltip(f.properties.name, { permanent: true, direction: 'center', className: 'city-label' });
          layer.on('click', () => {
            document.getElementById('sbMunicipio').innerText = f.properties.name;
            document.getElementById('sbMeta').innerText = `${CARGOS.find(c=>c.id===cargoAtivo).nome} · ${anoAtivo}`;
            atualizarRanking(f.properties.name.toUpperCase());
          });
        }
      }).addTo(map);
    });
}

function atualizarRanking(cidade) {
  const lista = dadosCache[cargoAtivo]?.[cidade] || [];
  const container = document.getElementById('ranking');
  container.innerHTML = '';

  if (!lista.length) { container.innerHTML = "Sem dados."; return; }
  const totalVotos = lista.reduce((s,v) => s + v.votos, 0);

  lista.slice(0, 20).forEach((cand, i) => {
    const pct = ((cand.votos / totalVotos) * 100).toFixed(1);
    const cor = PARTIDO_CORES[cand.partido] || '#8b93a8';
    container.innerHTML += `
      <div class="rank-item">
        <div class="rank-info">
          <span>${i+1}º ${cand.nome} (${cand.partido})</span>
          <span>${pct}%</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%; background:${cor}"></div>
        </div>
      </div>`;
  });
}

function renderSeletores() {
  const cSel = document.getElementById('cargoSelector');
  const aSel = document.getElementById('anoSelector');
  cSel.innerHTML = ''; aSel.innerHTML = '';

  CARGOS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = `sel-btn ${cargoAtivo === c.id ? 'active' : ''}`;
    btn.innerText = c.label;
    btn.onclick = () => { cargoAtivo = c.id; anoAtivo = config[c.id].abas[0]; renderSeletores(); carregarDados(); };
    cSel.appendChild(btn);
  });

  config[cargoAtivo].abas.forEach(a => {
    const btn = document.createElement('button');
    btn.className = `sel-btn ano ${anoAtivo === a ? 'active' : ''}`;
    btn.innerText = a;
    btn.onclick = () => { anoAtivo = a; renderSeletores(); carregarDados(); };
    aSel.appendChild(btn);
  });
}

function abrirConfig() {
  const div = document.getElementById('configInputs');
  div.innerHTML = CARGOS.map(c => `
    <label style="font-size:10px;">ID ${c.nome}:</label>
    <input id="cfg_${c.id}" value="${config[c.id].pubId}">
  `).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function salvarEFechar() {
  CARGOS.forEach(c => { config[c.id].pubId = document.getElementById(`cfg_${c.id}`).value; });
  localStorage.setItem('mapa_eleitoral_v2', JSON.stringify(config));
  document.getElementById('modalOverlay').classList.remove('open');
  carregarDados();
}

renderSeletores();
carregarDados();
</script>
</body>
</html>
