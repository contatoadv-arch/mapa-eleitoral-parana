<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Eleitoral PR — Comparador de Força Relativa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #14171f; --surface2: #1f2430;
    --border: #2a3148; --accent: #4f8ef7; --text: #e8ecf4; --text2: #8b93a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; gap: 8px; padding: 8px 15px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; }
  .input-search { background: #000; border: 1px solid var(--border); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 11px; width: 150px; outline: none; }
  .input-search:focus { border-color: var(--accent); }
  
  .status-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }

  .main { display: flex; flex: 1; overflow: hidden; position: relative; }
  #map { flex: 1; background: #07090d; }
  
  .legend { background: rgba(20, 23, 31, 0.85); padding: 10px; border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 9px; pointer-events: none; }
  .legend-item { display: flex; align-items: center; margin-bottom: 4px; }
  .legend-color { width: 12px; height: 12px; border-radius: 2px; margin-right: 8px; }

  .sidebar { width: 340px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .ranking-container { flex: 1; overflow-y: auto; padding: 12px; }
  
  .comparison-card { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; margin-bottom: 10px; border: 1px solid var(--border); }
  .comp-row { display: flex; justify-content: space-between; font-size: 10px; font-family: 'IBM Plex Mono'; margin-top: 5px; }
  .force-bar { height: 4px; background: #000; border-radius: 2px; margin-top: 4px; overflow: hidden; display: flex; }
  
  .vote-label {
    font-family: 'IBM Plex Mono', monospace !important; font-weight: 500 !important; color: rgba(255, 255, 255, 0.9) !important;
    font-size: 8px !important; background: none !important; border: none !important; text-shadow: 0 0 3px #000 !important;
  }
</style>
</head>
<body>

<header>
  <div class="status-badge" id="loadStatus">A CARREGAR DADOS...</div>
  <input type="text" id="searchMun" class="input-search" style="width:120px" placeholder="🔍 Cidade..." onkeyup="if(event.key==='Enter') buscarMunicipio()">
  
  <div style="display:flex; align-items:center; gap:10px; margin-left:10px; padding: 5px; background: rgba(255,255,255,0.03); border-radius: 5px;">
    <input type="text" id="cand1" class="input-search" placeholder="Candidato A (Qualquer cargo)" oninput="comparar()">
    <span style="font-size:10px; font-weight:bold; color:var(--text2)">VS</span>
    <input type="text" id="cand2" class="input-search" placeholder="Candidato B (Qualquer cargo)" oninput="comparar()">
  </div>

  <button class="sel-btn" style="margin-left:auto; padding: 6px 12px; font-size:10px; cursor:pointer; background:var(--surface2); color:white; border:1px solid var(--border); border-radius:4px" onclick="location.reload()">Reset Geral</button>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div id="sbTitle" style="font-size:14px; font-weight:600;">Análise de Força Relativa</div>
      <div id="sbSub" style="font-size:10px; color:var(--accent);">Candidatos normalizados pelo teto do cargo</div>
    </div>
    <div id="ranking" class="ranking-container"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CARGOS = [
  { id: 'prefeito', pubId: '2PACX-1vSckBOXlWUoaPUmw8cS57lzWxSVIcvqKe0l_t5kRo8ymELlAyqGbqkJQ7lT8x87EXXpv8ikou2tsSm9' },
  { id: 'vereador', pubId: '2PACX-1vRpedSBo3JsGPENvU-WDCoIsG9ij_n5H58-63dDQFyg-N1aNW_bTlp-qlRWnM7f-DxwY5GRnEAozAb6' },
  { id: 'governador', pubId: '2PACX-1vQgr3d0ZpsR4-XyZ78RTACi8w__I32rAtHCxygT1snVu8kAW_SDT7OHs2EZPFUa-TwwWmm-VuJjVews' },
  { id: 'senador', pubId: '2PACX-1vTwDP_rWXeGuNrZa_P1doV5yqyIKoPLgrXGuZ5E1jGW38zbPyqV3qqCcILV8kX8jNHUqtPaLoh8-6le' },
  { id: 'dep_estadual', pubId: '2PACX-1vRMmzjng4UNfnkH4GROewoGsj8_k-3V1K1G-uB9l3US_Y4oQ8vn399e_a7ca1WrFLQYsGaXMON43LxG' },
  { id: 'dep_federal', pubId: '2PACX-1vReWuQtkZI_ZdV6Wr7JIkgW5zN58vBR2iQPRPN7sLUu4cs3NhPMU_RPJYlrmLZxLYUWkPDjVUs_HQGV' }
];

const CORES = { A: '#4f8ef7', B: '#e63946', NEUTRO: '#3a3a3a' };

let bancoDados = {}; // Estrutura: { CIDADE: { CARGO: { candidatos: [], teto: 0 } } }
let munSelecionado = null;
let geoLayer;
let layersMunicipios = {};

const map = L.map('map', { zoomSnap: 0.5, preferCanvas: true }).setView([-24.8, -51.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// Função para misturar cores baseada na força
function interpolateColor(color1, color2, factor) {
    var result = color1.slice(1).match(/.{2}/g).map(function(hex, i) {
        return Math.round(parseInt(hex, 16) * (1 - factor) + parseInt(color2.slice(1).match(/.{2}/g)[i], 16) * factor).toString(16).padStart(2, '0');
    });
    return '#' + result.join('');
}

async function init() {
    for (const cargo of CARGOS) {
        const cacheKey = `data_${cargo.id}`;
        let csv = localStorage.getItem(cacheKey);
        if (!csv) {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/e/${cargo.pubId}/pub?output=csv`);
            csv = await res.text();
            localStorage.setItem(cacheKey, csv);
        }
        processarCargo(cargo.id, csv);
    }
    document.getElementById('loadStatus').innerText = "DADOS PRONTOS";
    renderizarMapa();
}

function processarCargo(cargoId, csv) {
    const linhas = csv.split('\n').filter(l => l.trim() !== "");
    const cabecalho = linhas[0].split(',').map(h => h.replace(/"/g, '').trim().toUpperCase());
    const idx = {
        mun: cabecalho.findIndex(h => h.includes('MUNICIPIO') || h.includes('NM_MUN')),
        cand: cabecalho.findIndex(h => h.includes('CANDIDATO') || h.includes('NM_VOTAVEL')),
        votos: cabecalho.findIndex(h => h.includes('VOTOS') || h.includes('QT_VOTOS'))
    };

    for(let i=1; i<linhas.length; i++) {
        const col = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
        const cid = col[idx.mun]?.toUpperCase();
        if (!cid) continue;

        if (!bancoDados[cid]) bancoDados[cid] = {};
        if (!bancoDados[cid][cargoId]) bancoDados[cid][cargoId] = { candidatos: [], teto: 0 };

        const votos = parseInt(col[idx.votos]?.replace(/\D/g,'')) || 0;
        bancoDados[cid][cargoId].candidatos.push({ nome: col[idx.cand]?.toUpperCase(), votos: votos });
        
        if (votos > bancoDados[cid][cargoId].teto) {
            bancoDados[cid][cargoId].teto = votos;
        }
    }
}

function calcularForca(cid, nomeBusca) {
    if (!bancoDados[cid] || !nomeBusca) return { forca: 0, votos: 0, cargo: null };
    
    // Busca o candidato em todos os cargos na cidade
    for (let cargoId in bancoDados[cid]) {
        const encontrado = bancoDados[cid][cargoId].candidatos.find(c => c.nome.includes(nomeBusca.toUpperCase()));
        if (encontrado) {
            const teto = bancoDados[cid][cargoId].teto || 1;
            return {
                forca: (encontrado.votos / teto) * 100,
                votos: encontrado.votos,
                cargo: cargoId
            };
        }
    }
    return { forca: 0, votos: 0, cargo: null };
}

function comparar() {
    renderizarMapa();
    atualizarRanking();
}

function renderizarMapa() {
    if (geoLayer) map.removeLayer(geoLayer);
    fetch('https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-41-mun.json')
    .then(r => r.json()).then(geo => {
        geoLayer = L.geoJSON(geo, {
            style: f => {
                const cid = f.properties.name.toUpperCase();
                const c1 = document.getElementById('cand1').value;
                const c2 = document.getElementById('cand2').value;

                if (!c1 && !c2) return { fillColor: '#111', weight: 0.2, fillOpacity: 0.4, color: '#333' };

                const f1 = calcularForca(cid, c1).forca;
                const f2 = calcularForca(cid, c2).forca;

                if (f1 === 0 && f2 === 0) return { fillColor: '#111', weight: 0.2, fillOpacity: 0.4, color: '#333' };

                // Lógica de Cor: Mistura baseada na dominância de força
                const totalForca = f1 + f2;
                const ratio = f2 / totalForca; 
                const corFinal = interpolateColor(CORES.A, CORES.B, ratio);

                return {
                    fillColor: corFinal,
                    fillOpacity: Math.max(0.3, Math.min(0.9, totalForca/100)), // Mais forte = mais brilhante
                    weight: 0.4,
                    color: '#fff'
                };
            },
            onEachFeature: (f, layer) => {
                const cid = f.properties.name.toUpperCase();
                layersMunicipios[cid] = layer;
                
                layer.on('click', () => { 
                    munSelecionado = f.properties.name; 
                    atualizarRanking(); 
                });
            }
        }).addTo(map);
    });
}

function atualizarRanking() {
    const container = document.getElementById('ranking');
    container.innerHTML = '';
    const c1 = document.getElementById('cand1').value;
    const c2 = document.getElementById('cand2').value;

    if (!c1 && !c2) {
        container.innerHTML = '<div style="color:var(--text2); font-size:11px">Insira nomes para comparar a força relativa por cidade.</div>';
        return;
    }

    if (munSelecionado) {
        const d1 = calcularForca(munSelecionado.toUpperCase(), c1);
        const d2 = calcularForca(munSelecionado.toUpperCase(), c2);
        
        document.getElementById('sbTitle').innerText = munSelecionado;
        container.innerHTML = `
            <div class="comparison-card" style="border-left: 4px solid ${CORES.A}">
                <div style="font-size:11px; font-weight:600">${c1.toUpperCase()}</div>
                <div class="comp-row"><span>${d1.cargo || 'N/A'}</span> <b>${d1.votos.toLocaleString()} votos</b></div>
                <div class="comp-row"><span style="color:var(--accent)">FORÇA NO CARGO</span> <b>${d1.forca.toFixed(1)}%</b></div>
                <div class="force-bar"><div style="width:${d1.forca}%; background:${CORES.A}"></div></div>
            </div>
            <div class="comparison-card" style="border-left: 4px solid ${CORES.B}">
                <div style="font-size:11px; font-weight:600">${c2.toUpperCase()}</div>
                <div class="comp-row"><span>${d2.cargo || 'N/A'}</span> <b>${d2.votos.toLocaleString()} votos</b></div>
                <div class="comp-row"><span style="color:${CORES.B}">FORÇA NO CARGO</span> <b>${d2.forca.toFixed(1)}%</b></div>
                <div class="force-bar"><div style="width:${d2.forca}%; background:${CORES.B}"></div></div>
            </div>
        `;
    } else {
        document.getElementById('sbTitle').innerText = "Paraná (Média de Força)";
        container.innerHTML = '<div style="color:var(--text2); font-size:11px">Clique numa cidade para ver o duelo detalhado.</div>';
    }
}

function buscarMunicipio() {
    const busca = document.getElementById('searchMun').value.toUpperCase();
    const layer = layersMunicipios[busca];
    if (layer) { map.fitBounds(layer.getBounds()); munSelecionado = busca; atualizarRanking(); }
}

init();
</script>
</body>
</html>
