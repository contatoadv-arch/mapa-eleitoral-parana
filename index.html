<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Eleitoral — Paraná (Analítico)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #181c27; --surface2: #1f2435;
    --border: #2a3148; --accent: #4f8ef7; --accent2: #f7c94f;
    --text: #e8ecf4; --text2: #8b93a8; --text3: #5a6070;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; gap: 15px; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; flex-wrap: wrap; }
  .sel-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid var(--border); padding-right: 15px; }
  .sel-label { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; }
  .sel-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
  .sel-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  
  /* Buscador e Comparação */
  .search-box { display: flex; gap: 5px; align-items: center; flex: 1; min-width: 300px; }
  .input-search { background: #000; border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 12px; width: 180px; }
  .compare-mode { font-size: 10px; color: var(--accent2); display: flex; align-items: center; gap: 5px; cursor: pointer; }

  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; background: #0a0d14; }
  
  .sidebar { width: 340px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); }
  .ranking-container { flex: 1; overflow-y: auto; padding: 12px; }
  
  .rank-item { margin-bottom: 12px; }
  .rank-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; font-family: var(--mono); }
  .bar-bg { background: var(--surface2); height: 6px; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.4s; }

  /* Legibilidade das Cidades - Suavizada */
  .city-label {
    font-weight: 600 !important;
    color: rgba(255,255,255,0.7) !important;
    text-shadow: 0 0 2px #000; 
    font-size: 9px !important;
    background: none !important; border: none !important; box-shadow: none !important;
  }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); padding: 20px; border-radius: 8px; width: 600px; }
</style>
</head>
<body>

<header>
  <div class="sel-group">
    <span class="sel-label">Cargo</span>
    <div id="cargoSelector"></div>
  </div>
  
  <div class="search-box">
    <input type="text" id="search1" class="input-search" placeholder="Candidato A (Azul)..." oninput="filtrarMapa()">
    <input type="text" id="search2" class="input-search" placeholder="Candidato B (Vermelho)..." oninput="filtrarMapa()">
    <button class="sel-btn" onclick="limparBusca()">Limpar</button>
  </div>

  <button class="sel-btn" style="margin-left:auto" onclick="abrirConfig()">⚙ Configurar</button>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div id="sbMunicipio" style="font-size:16px; font-weight:bold;">Selecione uma cidade</div>
      <div id="sbMeta" style="font-size:11px; color:var(--accent)">Dados consolidados</div>
    </div>
    <div id="ranking" class="ranking-container"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CARGOS = [
  { id: 'prefeito', label: 'PREF' },
  { id: 'vereador', label: 'VER' },
  { id: 'governador', label: 'GOV' },
  { id: 'dep_estadual', label: 'DEP.E' },
  { id: 'dep_federal', label: 'DEP.F' }
];

const PARTIDO_CORES = { 'PT':'#e63946','PL':'#1d6ce0','PSD':'#8338ec','MDB':'#f4a261','PP':'#2ec4b6','UNIÃO':'#fb8500','PSDB':'#3a86ff' };

let config = JSON.parse(localStorage.getItem('mapa_v3')) || {
  prefeito: { pubId: '2PACX-1vSckBOXlWUoaPUmw8cS57lzWxSVIcvqKe0l_t5kRo8ymELlAyqGbqkJQ7lT8x87EXXpv8ikou2tsSm9' },
  vereador: { pubId: '2PACX-1vRpedSBo3JsGPENvU-WDCoIsG9ij_n5H58-63dDQFyg-N1aNW_bTlp-qlRWnM7f-DxwY5GRnEAozAb6' },
  governador: { pubId: '2PACX-1vQgr3d0ZpsR4-XyZ78RTACi8w__I32rAtHCxygT1snVu8kAW_SDT7OHs2EZPFUa-TwwWmm-VuJjVews' },
  dep_estadual: { pubId: '2PACX-1vRMmzjng4UNfnkH4GROewoGsj8_k-3V1K1G-uB9l3US_Y4oQ8vn399e_a7ca1WrFLQYsGaXMON43LxG' },
  dep_federal: { pubId: '2PACX-1vReWuQtkZI_ZdV6Wr7JIkgW5zN58vBR2iQPRPN7sLUu4cs3NhPMU_RPJYlrmLZxLYUWkPDjVUs_HQGV' }
};

let dadosCache = {}; 
let cargoAtivo = 'prefeito';
let geoLayer;

const map = L.map('map').setView([-24.5, -51.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

async function carregarDados() {
  const cfg = config[cargoAtivo];
  if (!cfg.pubId) return;
  const url = `https://docs.google.com/spreadsheets/d/e/${cfg.pubId}/pub?output=csv`;
  try {
    const res = await fetch(url);
    const csv = await res.text();
    dadosCache[cargoAtivo] = processarCSV(csv);
    renderizarMapa();
  } catch(e) { console.error("Erro na planilha"); }
}

function processarCSV(csv) {
  const linhas = csv.split('\n').slice(1);
  const consolidado = {};
  linhas.forEach(l => {
    const col = l.split(',').map(c => c.replace(/"/g, '').trim());
    if (col.length < 6) return;
    const cid = col[1].toUpperCase();
    const nome = col[2].toUpperCase();
    const part = col[3].toUpperCase();
    const votos = parseInt(col[5].replace(/\D/g,'')) || 0;

    if (!consolidado[cid]) consolidado[cid] = {};
    if (!consolidado[cid][nome]) consolidado[cid][nome] = { nome, part, votos: 0 };
    consolidado[cid][nome].votos += votos; // SOMA DUPLICADOS
  });
  const final = {};
  for (let c in consolidado) final[c] = Object.values(consolidado[c]).sort((a,b) => b.votos - a.votos);
  return final;
}

function renderizarMapa() {
  if (geoLayer) map.removeLayer(geoLayer);
  fetch('https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-41-mun.json')
    .then(r => r.json()).then(geo => {
      geoLayer = L.geoJSON(geo, {
        style: f => getEstiloMunicipio(f),
        onEachFeature: (f, layer) => {
          layer.bindTooltip(f.properties.name, { permanent: true, direction: 'center', className: 'city-label' });
          layer.on('click', () => {
            document.getElementById('sbMunicipio').innerText = f.properties.name;
            atualizarRanking(f.properties.name.toUpperCase());
          });
        }
      }).addTo(map);
    });
}

function getEstiloMunicipio(f) {
  const cid = f.properties.name.toUpperCase();
  const lista = dadosCache[cargoAtivo]?.[cid] || [];
  const s1 = document.getElementById('search1').value.toUpperCase();
  const s2 = document.getElementById('search2').value.toUpperCase();

  // MODO BUSCA / CALOR
  if (s1 || s2) {
    const v1 = lista.find(c => c.nome.includes(s1))?.votos || 0;
    const v2 = lista.find(c => c.nome.includes(s2))?.votos || 0;

    if (s1 && s2) { // COMPARACAO
      if (v1 === 0 && v2 === 0) return { fillColor: '#111', weight: 0.5, fillOpacity: 0.3 };
      return { fillColor: v1 > v2 ? '#4f8ef7' : '#e63946', fillOpacity: 0.8, weight: 1, color: '#fff' };
    }
    
    // CALOR INDIVIDUAL
    const vAtivo = s1 ? v1 : v2;
    const corBase = s1 ? '#4f8ef7' : '#e63946';
    if (vAtivo === 0) return { fillColor: '#111', weight: 0.3, fillOpacity: 0.2 };
    return { fillColor: corBase, fillOpacity: Math.min(vAtivo/5000, 1), weight: 1, color: corBase };
  }

  // MODO NORMAL (PARTIDOS)
  const top = lista[0];
  return {
    fillColor: top ? (PARTIDO_CORES[top.part] || '#555') : '#1a1f2e',
    weight: 0.5, color: '#0f1117', fillOpacity: 0.7
  };
}

function atualizarRanking(cid) {
  const lista = dadosCache[cargoAtivo]?.[cid] || [];
  const container = document.getElementById('ranking');
  container.innerHTML = '';
  const maxV = lista[0]?.votos || 1;
  lista.slice(0, 20).forEach(c => {
    container.innerHTML += `
      <div class="rank-item">
        <div class="rank-info"><span>${c.nome} (${c.part})</span> <b>${c.votos.toLocaleString()} v</b></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${(c.votos/maxV)*100}%; background:${PARTIDO_CORES[c.part] || '#8b93a8'}"></div></div>
      </div>`;
  });
}

function filtrarMapa() { geoLayer.setStyle(f => getEstiloMunicipio(f)); }
function limparBusca() { document.getElementById('search1').value=''; document.getElementById('search2').value=''; filtrarMapa(); }

function init() {
  const cSel = document.getElementById('cargoSelector');
  CARGOS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'sel-btn' + (cargoAtivo === c.id ? ' active' : '');
    b.innerText = c.label;
    b.onclick = () => {
      document.querySelectorAll('.sel-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); cargoAtivo = c.id; carregarDados();
    };
    cSel.appendChild(b);
  });
  carregarDados();
}
init();
</script>
</body>
</html>
