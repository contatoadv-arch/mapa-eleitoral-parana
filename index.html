<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Eleitoral — Paraná (Consolidado)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #181c27; --surface2: #1f2435;
    --border: #2a3148; --accent: #4f8ef7; --accent2: #f7c94f;
    --text: #e8ecf4; --text2: #8b93a8; --text3: #5a6070;
    --success: #4ade80;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; gap: 14px; padding: 9px 18px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; }
  header h1 { font-size: 14px; font-weight: 500; }
  .sel-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 9px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; margin-right: 4px; }
  .sel-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  
  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; background: #0a0d14; }
  
  /* Sidebar com Gráfico */
  .sidebar { width: 350px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); }
  .ranking-container { flex: 1; overflow-y: auto; padding: 10px; }
  
  .rank-row { margin-bottom: 12px; }
  .rank-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-family: var(--mono); }
  .bar-bg { background: var(--surface2); height: 12px; border-radius: 6px; overflow: hidden; width: 100%; border: 1px solid var(--border); }
  .bar-fill { height: 100%; transition: width 0.5s ease-out; }

  /* Melhoria de Legibilidade no Mapa */
  .city-label {
    font-weight: 700 !important;
    color: #000 !important;
    text-shadow: 0 0 3px #fff, 0 0 5px #fff; /* Glow branco para ler no escuro */
    font-size: 11px !important;
    background: none !important;
    border: none !important;
    box-shadow: none !important;
  }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); padding: 20px; border-radius: 8px; width: 500px; }
  input { width: 100%; padding: 8px; margin: 10px 0; background: #000; color: #fff; border: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <h1>Mapa Eleitoral PR</h1>
  <div id="cargoSelector"></div>
  <button style="margin-left:auto" class="sel-btn" onclick="abrirConfig()">⚙ Configurar</button>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div id="sbMunicipio" style="font-size:18px; font-weight:bold;">Selecione uma cidade</div>
      <div id="sbAno" style="color:var(--accent); font-size:12px;"></div>
    </div>
    <div id="ranking" class="ranking-container"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Configurar Planilhas (Cache Ativo)</h3>
    <p style="font-size:11px; color:var(--text3)">Cole o ID da planilha publicada e os nomes das abas.</p>
    <div id="configInputs"></div>
    <button class="sel-btn active" onclick="salvarEFechar()">Salvar e Recarregar</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CARGOS = [
  { id: 'prefeito', label: 'PREF' },
  { id: 'vereador', label: 'VER' },
  { id: 'governador', label: 'GOV' },
  { id: 'dep_federal', label: 'DEP.F' }
];

// CORES PARTIDOS
const PARTIDO_CORES = { 'PT':'#e63946','PL':'#1d6ce0','PSD':'#8338ec','MDB':'#f4a261','PP':'#2ec4b6','UNIÃO':'#fb8500' };

// --- LOGICA DE CACHE (LOCALSTORAGE) ---
let config = JSON.parse(localStorage.getItem('mapa_eleitoral_cfg')) || {
  prefeito: { pubId: '', abas: '2024' },
  vereador: { pubId: '', abas: '2024' },
  governador: { pubId: '', abas: '2022' },
  dep_federal: { pubId: '', abas: '2022' }
};

let dadosCache = {}; 
let cargoAtivo = 'prefeito';
let geoLayer;

const map = L.map('map').setView([-24.5, -51.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

async function carregarDados() {
  const cfg = config[cargoAtivo];
  if (!cfg.pubId) return;

  try {
    const url = `https://docs.google.com/spreadsheets/d/e/${cfg.pubId}/pub?output=csv`;
    const response = await fetch(url);
    const csv = await response.text();
    dadosCache[cargoAtivo] = processarCSV(csv);
    renderizarMapa();
  } catch (e) { alert("Erro ao carregar planilha. Verifique se está publicada."); }
}

// --- PROCESSAMENTO COM AGRUPAMENTO (SOMA VOTOS REPETIDOS) ---
function processarCSV(csv) {
  const linhas = csv.split('\n').slice(1);
  const consolidado = {};

  linhas.forEach(linha => {
    const col = linha.split(',').map(c => c.replace(/"/g, '').trim());
    if (col.length < 6) return;

    const cidade = col[1].toUpperCase();
    const nome = col[2];
    const partido = col[3];
    const votos = parseInt(col[5]) || 0;

    if (!consolidado[cidade]) consolidado[cidade] = {};
    if (!consolidado[cidade][nome]) {
      consolidado[cidade][nome] = { nome, partido, votos: 0 };
    }
    consolidado[cidade][nome].votos += votos; // SOMA OS VOTOS (resolve seções repetidas)
  });

  // Converte objeto em array ordenado por cidade
  const resultadoFinal = {};
  for (let cid in consolidado) {
    resultadoFinal[cid] = Object.values(consolidado[cid]).sort((a,b) => b.votos - a.votos);
  }
  return resultadoFinal;
}

function renderizarMapa() {
  if (geoLayer) map.removeLayer(geoLayer);
  
  fetch('https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-41-mun.json')
    .then(r => r.json())
    .then(geo => {
      geoLayer = L.geoJSON(geo, {
        style: f => {
          const cid = f.properties.name.toUpperCase();
          const d = dadosCache[cargoAtivo]?.[cid];
          return {
            fillColor: d ? (PARTIDO_CORES[d[0].partido] || '#555') : '#222',
            weight: 1, color: '#444', fillOpacity: 0.7
          };
        },
        onEachFeature: (f, layer) => {
          const nomeCidade = f.properties.name;
          
          // NOME DA CIDADE VISÍVEL NO MAPA
          layer.bindTooltip(nomeCidade, { 
            permanent: true, 
            direction: 'center', 
            className: 'city-label' 
          });

          layer.on('click', () => {
            document.getElementById('sbMunicipio').innerText = nomeCidade;
            atualizarRanking(nomeCidade.toUpperCase());
          });
        }
      }).addTo(map);
    });
}

function atualizarRanking(cidade) {
  const lista = dadosCache[cargoAtivo]?.[cidade] || [];
  const container = document.getElementById('ranking');
  container.innerHTML = '';

  if (lista.length === 0) {
    container.innerHTML = "Sem dados para esta cidade.";
    return;
  }

  const maxVotos = lista[0].votos;

  lista.slice(0, 15).forEach(cand => {
    const pct = ((cand.votos / maxVotos) * 100).toFixed(0);
    const cor = PARTIDO_CORES[cand.partido] || var(--accent);
    
    container.innerHTML += `
      <div class="rank-row">
        <div class="rank-info">
          <span>${cand.nome} (${cand.partido})</span>
          <span>${cand.votos.toLocaleString()}</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%; background:${cor}"></div>
        </div>
      </div>
    `;
  });
}

// --- FUNÇÕES DE CONFIG E UI ---
function abrirConfig() {
  const div = document.getElementById('configInputs');
  div.innerHTML = '';
  CARGOS.forEach(c => {
    div.innerHTML += `
      <label>${c.label}</label>
      <input id="input_${c.id}" value="${config[c.id].pubId}" placeholder="ID da Planilha">
    `;
  });
  document.getElementById('modalOverlay').classList.add('open');
}

function salvarEFechar() {
  CARGOS.forEach(c => {
    config[c.id].pubId = document.getElementById(`input_${c.id}`).value;
  });
  localStorage.setItem('mapa_eleitoral_cfg', JSON.stringify(config));
  document.getElementById('modalOverlay').classList.remove('open');
  carregarDados();
}

function init() {
  const sel = document.getElementById('cargoSelector');
  CARGOS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'sel-btn' + (c.id === cargoAtivo ? ' active' : '');
    btn.innerText = c.label;
    btn.onclick = () => {
      document.querySelectorAll('.sel-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      cargoAtivo = c.id;
      carregarDados();
    };
    sel.appendChild(btn);
  });
  carregarDados();
}

init();
</script>
</body>
</html>
