<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mapa PR - Ultra Performance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <style>
        body { margin: 0; background: #07090d; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        header { height: 50px; background: #14171f; display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #2a3148; }
        #map { flex: 1; }
        #progress-container { position: absolute; top: 50px; left: 0; width: 100%; height: 4px; background: #000; z-index: 1001; }
        #progress-bar { width: 0%; height: 100%; background: #4f8ef7; transition: width 0.2s; }
        .sidebar { width: 300px; background: #14171f; border-left: 1px solid #2a3148; padding: 15px; }
        button { cursor: pointer; padding: 5px 10px; background: #1f2430; border: 1px solid #2a3148; color: #8b93a8; border-radius: 4px; }
        button.active { background: #4f8ef7; color: white; }
    </style>
</head>
<body>

<header>
    <button class="btn active" onclick="mudarCargo('prefeito', this)">PREF</button>
    <button class="btn" onclick="mudarCargo('vereador', this)">VER</button>
    <button class="btn" onclick="mudarCargo('governador', this)">GOV</button>
    <input type="text" id="c1" placeholder="Candidato A" style="margin-left:auto; background:#000; border:1px solid #2a3148; color:white; padding:5px;">
    <input type="text" id="c2" placeholder="Candidato B" style="background:#000; border:1px solid #2a3148; color:white; padding:5px;">
    <button onclick="limparCache()" style="color:#e63946">Reset Cache</button>
</header>

<div id="progress-container"><div id="progress-bar"></div></div>

<div style="display:flex; flex:1;">
    <div id="map"></div>
    <div class="sidebar">
        <h3 id="status">Iniciando...</h3>
        <p id="detalhes" style="font-size: 12px; color: #8b93a8;">Aguardando dados.</p>
        <div id="ranking"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CARGOS = {
    prefeito: '2PACX-1vSckBOXlWUoaPUmw8cS57lzWxSVIcvqKe0l_t5kRo8ymELlAyqGbqkJQ7lT8x87EXXpv8ikou2tsSm9',
    vereador: '2PACX-1vRpedSBo3JsGPENvU-WDCoIsG9ij_n5H58-63dDQFyg-N1aNW_bTlp-qlRWnM7f-DxwY5GRnEAozAb6',
    governador: '2PACX-1vQgr3d0ZpsR4-XyZ78RTACi8w__I32rAtHCxygT1snVu8kAW_SDT7OHs2EZPFUa-TwwWmm-VuJjVews'
};

let db = {};
let geoJSON = null;
let map = L.map('map').setView([-24.8, -51.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

async function init() {
    updateProgress(20);
    const res = await fetch('https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-41-mun.json');
    geoJSON = await res.json();
    updateProgress(40);
    await carregar('prefeito');
}

async function carregar(cargo) {
    document.getElementById('status').innerText = "Baixando...";
    const cache = localStorage.getItem('data_' + cargo);
    
    if (cache) {
        document.getElementById('detalhes').innerText = "Usando cache local.";
        processar(cache, cargo);
    } else {
        try {
            const resp = await fetch(`https://docs.google.com/spreadsheets/d/e/${CARGOS[cargo]}/pub?output=csv&t=${Date.now()}`);
            const text = await resp.text();
            localStorage.setItem('data_' + cargo, text);
            processar(text, cargo);
        } catch (e) {
            document.getElementById('status').innerText = "Erro no download";
        }
    }
}

function processar(csv, cargo) {
    const linhas = csv.split('\n');
    const total = linhas.length;
    document.getElementById('status').innerText = "Processando...";
    
    // Processamento assíncrono para não travar o Chrome
    let i = 1;
    function chunk() {
        const limit = Math.min(i + 500, total);
        for (; i < limit; i++) {
            const col = linhas[i].split(',');
            if (col.length < 3) continue;
            
            const mun = col[0].replace(/"/g, '').toUpperCase();
            const cand = col[1].replace(/"/g, '').toUpperCase();
            const votos = parseInt(col[2]) || 0;

            if (!db[mun]) db[mun] = {};
            if (!db[mun][cargo]) db[mun][cargo] = [];
            db[mun][cargo].push({ n: cand, v: votos });
        }
        
        updateProgress(40 + (i / total * 60));
        
        if (i < total) {
            setTimeout(chunk, 1);
        } else {
            document.getElementById('status').innerText = "Mapa Pronto";
            document.getElementById('detalhes').innerText = `${total} registros carregados.`;
            desenhar();
        }
    }
    chunk();
}

function desenhar() {
    if (window.camada) map.removeLayer(window.camada);
    window.camada = L.geoJSON(geoJSON, {
        style: { color: '#2a3148', weight: 1, fillColor: '#1f2430', fillOpacity: 0.6 }
    }).addTo(map);
}

function updateProgress(p) {
    document.getElementById('progress-bar').style.width = p + '%';
}

function mudarCargo(cargo, btn) {
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    carregar(cargo);
}

function limparCache() {
    localStorage.clear();
    location.reload();
}

init();
</script>
</body>
</html>
