<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Eleitoral PR — Analítico Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #14171f; --surface2: #1f2430;
    --border: #2a3148; --accent: #4f8ef7; --text: #e8ecf4; --text2: #8b93a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; gap: 8px; padding: 8px 15px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; }
  .pref-group { display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px; }
  .sel-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
  .sel-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  
  #turnoContainer { display: none; align-items: center; gap: 2px; margin-left: 5px; padding-left: 5px; border-left: 1px solid var(--border); }
  .turno-btn { font-family: 'IBM Plex Mono', monospace; font-size: 9px; padding: 2px 5px; border-radius: 2px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-weight: 600; }
  .turno-btn.active { background: var(--accent); color: #fff; }
  
  .input-search { background: #000; border: 1px solid var(--border); color: #fff; padding: 5px 8px; border-radius: 4px; font-size: 11px; width: 110px; }
  .input-mun { width: 130px; border-color: var(--accent); }

  .main { display: flex; flex: 1; overflow: hidden; position: relative; }
  #map { flex: 1; background: #07090d; }
  
  .legend { background: rgba(20, 23, 31, 0.75); padding: 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 9px; pointer-events: none; }
  .legend i { width: 10px; height: 10px; float: left; margin-right: 6px; border-radius: 2px; }

  .sidebar { width: 320px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .ranking-container { flex: 1; overflow-y: auto; padding: 12px; }
  .rank-item { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .rank-info { display: flex; justify-content: space-between; font-size: 10px; font-family: 'IBM Plex Mono'; margin-bottom: 4px; }
  .bar-bg { background: #000; height: 5px; border-radius: 2px; }
  .bar-fill { height: 100%; transition: width 0.5s; border-radius: 2px; }

  .vote-label {
    font-family: 'IBM Plex Mono', monospace !important; font-weight: 500 !important; color: rgba(255, 255, 255, 0.85) !important;
    font-size: 8px !important; background: none !important; border: none !important; text-shadow: none !important;
  }
</style>
</head>
<body>

<header>
  <div class="pref-group">
    <button class="sel-btn" id="btn-prefeito" onclick="trocarCargo('prefeito')">PREF</button>
    <div id="turnoContainer">
      <button class="turno-btn active" id="btn1t" onclick="setTurno('1')">1T</button>
      <button class="turno-btn" id="btn2t" onclick="setTurno('2')">2T</button>
    </div>
  </div>
  <div id="outrosCargos" style="display:flex; gap:4px;"></div>
  <div style="width:1px; height:20px; background:var(--border); margin: 0 5px;"></div>
  <input type="text" id="searchMun" class="input-search input-mun" placeholder="🔍 Cidade..." onkeyup="if(event.key==='Enter') buscarMunicipio()">
  <input type="text" id="search1" class="input-search" placeholder="Candidato A" oninput="renderizarMapa()">
  <input type="text" id="search2" class="input-search" placeholder="Candidato B" oninput="renderizarMapa()">
  <button class="sel-btn" onclick="limparGeral()" title="Limpa filtros e força recarga do cache">Reset/Limpar Cache</button>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div id="sbTitle" style="font-size:14px; font-weight:600;">Iniciando...</div>
      <div id="sbSub" style="font-size:10px; color:var(--accent);">PR — ANALÍTICO (CACHE ATIVO)</div>
    </div>
    <div id="ranking" class="ranking-container"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CARGOS = [
  { id: 'prefeito', label: 'PREF', pubId: '2PACX-1vSckBOXlWUoaPUmw8cS57lzWxSVIcvqKe0l_t5kRo8ymELlAyqGbqkJQ7lT8x87EXXpv8ikou2tsSm9' },
  { id: 'vereador', label: 'VER', pubId: '2PACX-1vRpedSBo3JsGPENvU-WDCoIsG9ij_n5H58-63dDQFyg-N1aNW_bTlp-qlRWnM7f-DxwY5GRnEAozAb6' },
  { id: 'governador', label: 'GOV', pubId: '2PACX-1vQgr3d0ZpsR4-XyZ78RTACi8w__I32rAtHCxygT1snVu8kAW_SDT7OHs2EZPFUa-TwwWmm-VuJjVews' },
  { id: 'senador', label: 'SEN', pubId: '2PACX-1vTwDP_rWXeGuNrZa_P1doV5yqyIKoPLgrXGuZ5E1jGW38zbPyqV3qqCcILV8kX8jNHUqtPaLoh8-6le' }, 
  { id: 'dep_estadual', label: 'DEP.E', pubId: '2PACX-1vRMmzjng4UNfnkH4GROewoGsj8_k-3V1K1G-uB9l3US_Y4oQ8vn399e_a7ca1WrFLQYsGaXMON43LxG' },
  { id: 'dep_federal', label: 'DEP.F', pubId: '2PACX-1vReWuQtkZI_ZdV6Wr7JIkgW5zN58vBR2iQPRPN7sLUu4cs3NhPMU_RPJYlrmLZxLYUWkPDjVUs_HQGV' }
];

const PARTIDO_CORES = { 'PT':'#e63946','PL':'#1d6ce0','PSD':'#8338ec','MDB':'#f4a261','PP':'#2ec4b6','UNIÃO':'#fb8500','PODE':'#00ced1','REPUBLICANOS':'#10355a' };

let dadosAtivos = null;
let cargoAtual = 'prefeito';
let turnoAtivo = '1'; 
let munSelecionado = null;
let geoLayer;
let layersMunicipios = {};

const map = L.map('map', { zoomSnap: 0.5, preferCanvas: true }).setView([-24.8, -51.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const legend = L.control({position: 'bottomright'});
legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML += '<b>PARTIDOS</b><br>';
    for (let p in PARTIDO_CORES) div.innerHTML += `<i style="background:${PARTIDO_CORES[p]}"></i> ${p}<br>`;
    return div;
};
legend.addTo(map);

// GERENCIADOR DE CACHE
async function obterDados(id) {
  const cacheKey = `cache_eleicao_${id}`;
  const cached = localStorage.getItem(cacheKey);
  
  if (cached) {
    console.log(`Carregando ${id} do cache local...`);
    return JSON.parse(cached);
  }

  const cargoCfg = CARGOS.find(c => c.id === id);
  const url = `https://docs.google.com/spreadsheets/d/e/${cargoCfg.pubId}/pub?output=csv&t=${Date.now()}`;
  
  try {
    const res = await fetch(url);
    const csv = await res.text();
    const dadosProcessados = processarCSV(csv);
    
    // Salva no cache por 1 hora ou até limpar manual
    localStorage.setItem(cacheKey, JSON.stringify(dadosProcessados));
    return dadosProcessados;
  } catch (e) {
    console.error("Erro ao buscar dados:", e);
    return null;
  }
}

async function trocarCargo(id) {
  cargoAtual = id;
  document.getElementById('turnoContainer').style.display = (id === 'prefeito') ? 'flex' : 'none';
  document.querySelectorAll('.sel-btn').forEach(b => b.classList.remove('active'));
  if(id === 'prefeito') document.getElementById('btn-prefeito').classList.add('active');
  else document.querySelector(`[data-id="${id}"]`)?.classList.add('active');
  
  document.getElementById('sbTitle').innerText = "Processando...";
  dadosAtivos = await obterDados(id);
  renderizarMapa();
  atualizarRanking();
}

function processarCSV(csv) {
  const linhas = csv.split('\n').filter(l => l.trim() !== "");
  const cabecalho = linhas[0].split(',').map(h => h.replace(/"/g, '').trim().toUpperCase());
  const findIdx = (targets) => cabecalho.findIndex(h => targets.some(t => h.includes(t)));
  const idx = {
    mun: findIdx(['MUNICIPIO', 'CIDADE', 'NM_MUN']),
    cand: findIdx(['CANDIDATO', 'NM_VOTAVEL']),
    part: findIdx(['PARTIDO', 'SG_PARTIDO']),
    sit: findIdx(['SITUACAO', 'DS_SIT']),
    votos: findIdx(['VOTOS', 'QT_VOTOS'])
  };
  
  const consolidado = {};
  for(let i=1; i<linhas.length; i++) {
    const col = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
    const cid = col[idx.mun]?.toUpperCase();
    if (!cid) continue;

    // Guardamos o dado bruto por município; o filtro de turno/candidato é feito na renderização para ser dinâmico
    if (!consolidado[cid]) consolidado[cid] = [];
    consolidado[cid].push({
        nome: col[idx.cand]?.toUpperCase() || "OUTROS",
        part: col[idx.part]?.toUpperCase() || 'S/P',
        votos: parseInt((col[idx.votos] || "0").replace(/\D/g,'')) || 0,
        sit: col[idx.sit]?.toUpperCase() || ""
    });
  }
  return consolidado;
}

function renderizarMapa() {
  if (geoLayer) map.removeLayer(geoLayer);
  fetch('https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-41-mun.json')
    .then(r => r.json()).then(geo => {
      geoLayer = L.geoJSON(geo, {
        style: f => getEstilo(f),
        onEachFeature: (f, layer) => {
          const cid = f.properties.name.toUpperCase();
          layersMunicipios[cid] = layer;
          const v = getVotosDestaque(cid);
          if (v > 0) {
            layer.bindTooltip(v.toLocaleString(), { permanent: true, direction: 'center', className: 'vote-label', interactive: false });
          }
          layer.on('click', (e) => { L.DomEvent.stopPropagation(e); munSelecionado = f.properties.name; atualizarRanking(); });
        }
      }).addTo(map);
      atualizarVisibilidadeLabels();
    });
}

function getEstilo(f) {
  const cid = f.properties.name.toUpperCase();
  let lista = dadosAtivos?.[cid] || [];
  
  // Filtro de Turno (apenas se for Prefeito)
  if (cargoAtual === 'prefeito') {
      lista = lista.filter(c => turnoAtivo === '1' ? !c.sit.includes("2º TURNO") : c.sit.includes("2º TURNO"));
  }
  lista.sort((a,b) => b.votos - a.votos);

  if (lista.length === 0) return { fillColor: '#111', weight: 0.2, fillOpacity: 0.4, color: '#333' };
  
  const s1 = document.getElementById('search1').value.toUpperCase();
  const s2 = document.getElementById('search2').value.toUpperCase();

  if (s1 || s2) {
    const v1 = lista.find(c => c.nome.includes(s1))?.votos || 0;
    const v2 = lista.find(c => c.nome.includes(s2))?.votos || 0;
    return { fillColor: v1 > v2 ? '#4f8ef7' : '#e63946', fillOpacity: 0.7, weight: 0.4, color: '#fff' };
  }
  return { fillColor: PARTIDO_CORES[lista[0]?.part] || '#3a3a3a', fillOpacity: 0.7, weight: 0.2, color: '#000' };
}

function getVotosDestaque(cid) {
  let lista = dadosAtivos?.[cid] || [];
  if (cargoAtual === 'prefeito') {
      lista = lista.filter(c => turnoAtivo === '1' ? !c.sit.includes("2º TURNO") : c.sit.includes("2º TURNO"));
  }
  if (lista.length === 0) return 0;
  lista.sort((a,b) => b.votos - a.votos);
  const s1 = document.getElementById('search1').value.toUpperCase();
  return s1 ? (lista.find(c => c.nome.includes(s1))?.votos || 0) : lista[0]?.votos;
}

function atualizarRanking() {
  const container = document.getElementById('ranking');
  container.innerHTML = '';
  let consolidadoGlobal = [];

  if (munSelecionado) {
    let lista = dadosAtivos?.[munSelecionado.toUpperCase()] || [];
    if (cargoAtual === 'prefeito') lista = lista.filter(c => turnoAtivo === '1' ? !c.sit.includes("2º TURNO") : c.sit.includes("2º TURNO"));
    consolidadoGlobal = lista.sort((a,b) => b.votos - a.votos);
    document.getElementById('sbTitle').innerText = munSelecionado;
  } else {
    const total = {};
    Object.values(dadosAtivos || {}).forEach(cidade => {
        let lista = cidade;
        if (cargoAtual === 'prefeito') lista = cidade.filter(c => turnoAtivo === '1' ? !c.sit.includes("2º TURNO") : c.sit.includes("2º TURNO"));
        lista.forEach(cand => {
            if (!total[cand.nome]) total[cand.nome] = { ...cand, votos: 0 };
            total[cand.nome].votos += cand.votos;
        });
    });
    consolidadoGlobal = Object.values(total).sort((a,b) => b.votos - a.votos);
    document.getElementById('sbTitle').innerText = "Paraná Total";
  }

  const maxV = consolidadoGlobal[0]?.votos || 1;
  consolidadoGlobal.slice(0, 50).forEach(c => {
    container.innerHTML += `<div class="rank-item"><div class="rank-info"><span>${c.nome}</span> <b>${c.votos.toLocaleString()}</b></div><div class="bar-bg"><div class="bar-fill" style="width:${(c.votos/maxV)*100}%; background:${PARTIDO_CORES[c.part] || '#555'}"></div></div></div>`;
  });
}

function atualizarVisibilidadeLabels() {
    const z = map.getZoom();
    document.querySelectorAll('.vote-label').forEach(el => el.style.display = z >= 8.5 ? 'block' : 'none');
}

map.on('zoomstart', () => document.querySelectorAll('.vote-label').forEach(el => el.style.display = 'none'));
map.on('zoomend', atualizarVisibilidadeLabels);

function limparGeral() {
  // Limpa o cache do navegador para forçar download novo
  CARGOS.forEach(c => localStorage.removeItem(`cache_eleicao_${c.id}`));
  munSelecionado = null;
  document.getElementById('search1').value = "";
  document.getElementById('search2').value = "";
  map.setView([-24.8, -51.5], 7);
  trocarCargo(cargoAtual);
}

const outros = document.getElementById('outrosCargos');
CARGOS.forEach(c => {
  if(c.id === 'prefeito') return;
  const btn = document.createElement('button');
  btn.className = 'sel-btn'; btn.innerText = c.label; btn.dataset.id = c.id;
  btn.onclick = () => trocarCargo(c.id);
  outros.appendChild(btn);
});

trocarCargo('prefeito');
</script>
</body>
</html>
